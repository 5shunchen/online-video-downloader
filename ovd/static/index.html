<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>在线视频下载器</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <style>
    body { background: #f7f9fc; transition: background 0.3s; }
    .cover { width: 110px; height: 150px; object-fit: cover; border-radius: 6px; }
    .ep-btn { margin: 4px; min-width: 90px; }
    .ep-btn.selected { background: #198754; color: #fff; border-color: #198754; }
    .badge-status { min-width: 84px; }
    /* 暗黑模式 */
    body.dark { background: #1a1a2e; color: #eee; }
    .dark .card { background: #16213e; border-color: #33415c; color: #eee; }
    .dark .card-body { background: #16213e; color: #eee; }
    .dark .table { color: #eee; }
    .dark .table-hover tbody tr:hover { color: #eee; background: #1f2d4d; }
    .dark .form-control, .dark .form-select { background: #16213e; border-color: #33415c; color: #eee; }
    .dark .alert-info { background: #1a3a5c; border-color: #2d5a8c; color: #b8d4f0; }
    .dark .badge.bg-success { background: #2d6a4f !important; }
    .dark .badge.bg-primary { background: #2d5a8c !important; }
    .dark .badge.bg-secondary { background: #495057 !important; }
    .dark .badge.bg-danger { background: #8c2d3a !important; }
    .dark .btn-outline-secondary { color: #adb5bd; border-color: #495057; }
    .dark .btn-outline-secondary:hover { color: #fff; background: #495057; }
    .dark .nav-tabs .nav-link { color: #adb5bd; }
    .dark .nav-tabs .nav-link.active { background: #16213e; border-color: #33415c; color: #eee; }
    .dark .text-muted { color: #888 !important; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark bg-primary mb-3">
  <div class="container">
    <span class="navbar-brand mb-0 h1">📺 在线视频下载器</span>
    <div class="d-flex align-items-center gap-2">
      <button class="btn btn-sm btn-outline-light" onclick="toggleDarkMode()" title="切换主题">🌓</button>
      <button class="btn btn-sm btn-outline-light" onclick="showFavorites()" title="我的收藏">⭐</button>
      <button class="btn btn-sm btn-outline-light" onclick="showSettings()" title="系统设置">⚙</button>
      <span class="text-white small" id="meta">加载中…</span>
    </div>
  </div>
</nav>

<div class="container">
  <!-- 搜索视图 -->
  <div id="searchView">
    <div class="input-group mb-3">
      <select id="sourceSelect" class="form-select" style="max-width: 150px;">
        <option value="">全部源</option>
      </select>
      <input id="kw" type="text" class="form-control"
             placeholder="输入关键字, 例如「遮天」"
             onfocus="showSearchHistory()"
             onblur="setTimeout(hideSearchHistory, 200)" />
      <button id="btnSearch" class="btn btn-primary">🔍 搜索</button>
    </div>
    <div id="searchHistoryDropdown" class="dropdown-menu show mb-3" style="display: none;"></div>
    <div id="results" class="row g-3 mb-4"></div>
    <h5>📥 下载任务</h5>
    <div class="alert alert-info py-2 mb-2" id="downloadStatus">
      📥 下载中: <strong>0/2</strong> | ⏳ 排队中: 0 | ✅ 完成: 0 | ❌ 失败: 0
    </div>
    <div class="mb-2">
      <button class="btn btn-sm btn-outline-secondary" onclick="selectAllJobs(true)">全选</button>
      <button class="btn btn-sm btn-outline-secondary" onclick="selectAllJobs(false)">全不选</button>
      <button id="btnDeleteSelected" class="btn btn-sm btn-danger" disabled onclick="deleteSelectedJobs()">删除选中</button>
      <button class="btn btn-sm btn-outline-danger ms-2" onclick="deleteAllJobs()">清空全部</button>
    </div>
    <div class="table-responsive">
      <table class="table table-sm table-hover align-middle">
        <thead><tr>
          <th style="width: 30px;"></th><th>#</th><th>剧名</th><th>集</th><th>状态</th><th>错误</th><th>输出</th><th>操作</th>
        </tr></thead>
        <tbody id="jobsBody"></tbody>
      </table>
    </div>
  </div>

  <!-- 详情视图（默认隐藏） -->
  <div id="detailView" style="display: none;">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 id="detailTitle"></h5>
      <button id="btnBack" class="btn btn-outline-secondary">← 返回搜索</button>
    </div>
    <div id="detailCard" class="card mb-4">
      <div class="card-body text-muted">加载中…</div>
    </div>
    <h5>📥 下载任务</h5>
    <div class="alert alert-info py-2 mb-2" id="downloadStatus">
      📥 下载中: <strong>0/2</strong> | ⏳ 排队中: 0 | ✅ 完成: 0 | ❌ 失败: 0
    </div>
    <div class="mb-2">
      <button class="btn btn-sm btn-outline-secondary" onclick="selectAllJobs(true)">全选</button>
      <button class="btn btn-sm btn-outline-secondary" onclick="selectAllJobs(false)">全不选</button>
      <button id="btnDeleteSelectedDetail" class="btn btn-sm btn-danger" disabled onclick="deleteSelectedJobs()">删除选中</button>
      <button class="btn btn-sm btn-outline-danger ms-2" onclick="deleteAllJobs()">清空全部</button>
    </div>
    <div class="table-responsive">
      <table class="table table-sm table-hover align-middle">
        <thead><tr>
          <th style="width: 30px;"></th><th>#</th><th>剧名</th><th>集</th><th>状态</th><th>错误</th><th>输出</th><th>操作</th>
        </tr></thead>
        <tbody id="jobsBodyDetail"></tbody>
      </table>
    </div>
  </div>

  <!-- 设置视图（默认隐藏） -->
  <div id="settingsView" style="display: none;">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5>⚙ 系统设置</h5>
      <button id="btnBackSettings" class="btn btn-outline-secondary">← 返回搜索</button>
    </div>
    <div class="card mb-4">
      <div class="card-body">
        <h6 class="card-title mb-3">📡 搜索源管理</h6>
        <div class="mb-3">
          <button class="btn btn-primary btn-sm" onclick="showAddSourceModal()">+ 新增搜索源</button>
        </div>
        <div class="table-responsive">
          <table class="table table-sm table-hover align-middle">
            <thead>
              <tr>
                <th>#</th>
                <th>源名称</th>
                <th>API 地址</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="sourcesTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- 新增/编辑搜索源模态框 -->
  <div class="modal fade" id="sourceModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="sourceModalTitle">新增搜索源</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="sourceForm">
            <input type="hidden" id="sourceOldName">
            <div class="mb-3">
              <label for="sourceName" class="form-label">源名称</label>
              <input type="text" class="form-control" id="sourceName" required placeholder="例如：光速资源">
            </div>
            <div class="mb-3">
              <label for="sourceApi" class="form-label">API 地址</label>
              <input type="text" class="form-control" id="sourceApi" required placeholder="例如：https://api.example.com/api.php/provide/vod">
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn btn-primary" onclick="saveSource()">保存</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const $ = (sel) => document.querySelector(sel);

  // 全局状态
  let currentDetail = null;

  async function api(path, opts = {}) {
    const r = await fetch(path, opts);
    if (!r.ok) {
      const err = await r.text();
      throw new Error(err || '请求失败 ' + r.status);
    }
    return r.json();
  }

  function escapeHTML(s) {
    return String(s ?? '').replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])
    );
  }

  // 切换视图
  function showView(viewName) {
    $('#searchView').style.display = 'none';
    $('#detailView').style.display = 'none';
    $('#settingsView').style.display = 'none';
    if (viewName === 'search') {
      $('#searchView').style.display = 'block';
    } else if (viewName === 'detail') {
      $('#detailView').style.display = 'block';
    } else if (viewName === 'settings') {
      $('#settingsView').style.display = 'block';
    }
  }

  // 搜索
  async function search() {
    const kw = $('#kw').value.trim();
    if (!kw) return;
    const source = $('#sourceSelect').value;
    $('#results').innerHTML = '<div class="text-muted">搜索中…</div>';
    const url = source
      ? `/api/search?wd=${encodeURIComponent(kw)}&source=${encodeURIComponent(source)}`
      : `/api/search?wd=${encodeURIComponent(kw)}`;
    const data = await api(url);
    if (!data.items.length) {
      $('#results').innerHTML =
        '<div class="alert alert-warning">没有找到结果, 换个关键字试试。</div>';
      return;
    }
    $('#results').innerHTML = data.items.map((v, i) => `
      <div class="col-md-6 result-card" data-source="${v.source_name}" data-vod-id="${v.vod_id}">
        <div class="card h-100"><div class="row g-0">
          <div class="col-auto p-2">
            <img class="cover" src="${v.pic || ''}"
                 onerror="this.style.visibility='hidden'" alt="" />
          </div>
          <div class="col">
            <div class="card-body">
              <h6 class="card-title mb-1">${escapeHTML(v.name)}
                <span class="badge bg-secondary ms-1">${escapeHTML(v.remarks||'')}</span>
                <span class="badge bg-info ms-1">${escapeHTML(v.quality||'高清')}</span>
              </h6>
              <p class="small text-muted mb-2">
                ${escapeHTML(v.year||'')} · ${escapeHTML(v.area||'')}
                · ${escapeHTML(v.type_name||'')}
                · 源: ${escapeHTML(v.source_name)}
              </p>
              <button class="btn btn-sm btn-outline-primary detail-btn"
                      data-source="${v.source_name}" data-vod-id="${v.vod_id}" data-name="${v.name.replace(/'/g,"\\'")}">
                <span class="status-text">查看分集</span>
              </button>
              <button class="btn btn-sm btn-outline-warning ms-1 fav-btn"
                      data-source="${v.source_name}" data-vod-id="${v.vod_id}" data-name="${v.name.replace(/'/g,"\\'")}" data-pic="${(v.pic||'').replace(/'/g,"\\'")}" data-remarks="${(v.remarks||'').replace(/'/g,"\\'")}" data-year="${(v.year||'').replace(/'/g,"\\'")}" data-area="${(v.area||'').replace(/'/g,"\\'")}" data-type-name="${(v.type_name||'').replace(/'/g,"\\'")}">
                ⭐ 收藏
              </button>
            </div>
          </div>
        </div></div>
      </div>
    `).join('');

    // 绑定点击事件
    document.querySelectorAll('.detail-btn').forEach(btn => {
      btn.onclick = () => handleOpenDetail(btn.dataset.source, parseInt(btn.dataset.vodId), btn.dataset.name);
    });

    // 绑定收藏按钮事件
    document.querySelectorAll('.fav-btn').forEach(btn => {
      btn.onclick = async (e) => {
        e.stopPropagation();
        const item = {
          source_name: btn.dataset.source,
          vod_id: parseInt(btn.dataset.vodId),
          name: btn.dataset.name,
          pic: btn.dataset.pic,
          remarks: btn.dataset.remarks,
          year: btn.dataset.year,
          area: btn.dataset.area,
          type_name: btn.dataset.typeName,
        };
        await toggleFavorite(item);
        // 切换按钮样式
        const isFav = await isFavorite(item.source_name, item.vod_id);
        btn.classList.toggle('btn-warning', isFav);
        btn.classList.toggle('btn-outline-warning', !isFav);
        btn.textContent = isFav ? '⭐ 已收藏' : '⭐ 收藏';
      };
      // 初始状态检查
      (async () => {
        const isFav = await isFavorite(btn.dataset.source, parseInt(btn.dataset.vodId));
        btn.classList.toggle('btn-warning', isFav);
        btn.classList.toggle('btn-outline-warning', !isFav);
        btn.textContent = isFav ? '⭐ 已收藏' : '⭐ 收藏';
      })();
    });

    // 后台异步验证搜索结果可用性
    validateSearchResults(data.items);
  }

  // 渲染搜索结果（供收藏页等复用）
  function renderResults(items) {
    $('#results').innerHTML = items.map((v, i) => `
      <div class="col-md-6 result-card" data-source="${v.source_name}" data-vod-id="${v.vod_id}">
        <div class="card h-100"><div class="row g-0">
          <div class="col-auto p-2">
            <img class="cover" src="${v.pic || ''}"
                 onerror="this.style.visibility='hidden'" alt="" />
          </div>
          <div class="col">
            <div class="card-body">
              <h6 class="card-title mb-1">${escapeHTML(v.name)}
                <span class="badge bg-secondary ms-1">${escapeHTML(v.remarks||'')}</span>
              </h6>
              <p class="small text-muted mb-2">
                ${escapeHTML(v.year||'')} · ${escapeHTML(v.area||'')}
                · ${escapeHTML(v.type_name||'')}
                · 源: ${escapeHTML(v.source_name)}
              </p>
              <button class="btn btn-sm btn-outline-primary detail-btn"
                      data-source="${v.source_name}" data-vod-id="${v.vod_id}" data-name="${v.name.replace(/'/g,"\\'")}">
                <span class="status-text">查看分集</span>
              </button>
              <button class="btn btn-sm btn-outline-warning ms-1 fav-btn"
                      data-source="${v.source_name}" data-vod-id="${v.vod_id}" data-name="${v.name.replace(/'/g,"\\'")}" data-pic="${(v.pic||'').replace(/'/g,"\\'")}" data-remarks="${(v.remarks||'').replace(/'/g,"\\'")}" data-year="${(v.year||'').replace(/'/g,"\\'")}" data-area="${(v.area||'').replace(/'/g,"\\'")}" data-type-name="${(v.type_name||'').replace(/'/g,"\\'")}">
                ⭐ 收藏
              </button>
            </div>
          </div>
        </div></div>
      </div>
    `).join('');

    // 绑定点击事件
    document.querySelectorAll('.detail-btn').forEach(btn => {
      btn.onclick = () => handleOpenDetail(btn.dataset.source, parseInt(btn.dataset.vodId), btn.dataset.name);
    });

    // 绑定收藏按钮事件
    document.querySelectorAll('.fav-btn').forEach(btn => {
      btn.onclick = async (e) => {
        e.stopPropagation();
        const item = {
          source_name: btn.dataset.source,
          vod_id: parseInt(btn.dataset.vodId),
          name: btn.dataset.name,
          pic: btn.dataset.pic,
          remarks: btn.dataset.remarks,
          year: btn.dataset.year,
          area: btn.dataset.area,
          type_name: btn.dataset.typeName,
        };
        await toggleFavorite(item);
        const isFav = await isFavorite(item.source_name, item.vod_id);
        btn.classList.toggle('btn-warning', isFav);
        btn.classList.toggle('btn-outline-warning', !isFav);
        btn.textContent = isFav ? '⭐ 已收藏' : '⭐ 收藏';
      };
      // 初始状态检查
      (async () => {
        const isFav = await isFavorite(btn.dataset.source, parseInt(btn.dataset.vodId));
        btn.classList.toggle('btn-warning', isFav);
        btn.classList.toggle('btn-outline-warning', !isFav);
        btn.textContent = isFav ? '⭐ 已收藏' : '⭐ 收藏';
      })();
    });
  }

  // 后台异步验证搜索结果
  async function validateSearchResults(items) {
    for (const v of items) {
      try {
        const card = document.querySelector(`.result-card[data-source="${v.source_name}"][data-vod-id="${v.vod_id}"]`);
        if (!card) continue;
        const btn = card.querySelector('.detail-btn');
        if (!btn) continue;

        // 发送轻量验证请求
        const resp = await fetch(`/api/detail?source_name=${encodeURIComponent(v.source_name)}&vod_id=${v.vod_id}`);
        if (!resp.ok) {
          // 标记为失效
          card.style.opacity = '0.5';
          btn.disabled = true;
          btn.querySelector('.status-text').textContent = '链接已失效';
          btn.classList.remove('btn-outline-primary');
          btn.classList.add('btn-outline-secondary');
        }
      } catch (e) {
        // 忽略错误
      }
      // 控制并发
      await new Promise(r => setTimeout(r, 200));
    }
  }

  // 打开详情页
  async function handleOpenDetail(sourceName, vodId, videoName) {
    // 先在后台验证，成功才跳转
    try {
      const d = await api(`/api/detail?source_name=${encodeURIComponent(sourceName)}&vod_id=${vodId}`);
    } catch (e) {
      alert('该剧集播放源已失效，请换其他剧集试试');
      return;
    }

    showView('detail');
    $('#detailTitle').textContent = '📺 加载中...';
    $('#detailCard').innerHTML = '<div class="card-body text-muted">加载中…</div>';

    try {
      const d = await api(`/api/detail?source_name=${encodeURIComponent(sourceName)}&vod_id=${vodId}`);
      const best = d.play_sources.find(s => s.is_recommended) || d.play_sources[0];
      if (!best) {
        $('#detailCard').innerHTML = '<div class="card-body text-danger">没有可用播放源</div>';
        return;
      }

      currentDetail = {
        videoName: d.summary.name || videoName,
        sourceName,
        flag: best.flag,
        episodes: best.episodes,
        selected: new Set(),
      };

      $('#detailTitle').textContent = '📺 ' + currentDetail.videoName;

      // 保存所有播放源供切换
      currentDetail.allPlaySources = d.play_sources;

      // 渲染播放源选择下拉框
      let sourceOptions = '';
      for (let s of d.play_sources) {
        const selected = s.flag === best.flag ? 'selected' : '';
        const rec = s.is_recommended ? ' ★推荐' : '';
        const m3u8 = s.is_m3u8 ? ' [直链]' : ' [解析]';
        sourceOptions += `<option value="${escapeHTML(s.flag)}" ${selected}>${escapeHTML(s.flag)}${rec}${m3u8} (${s.episodes.length}集)</option>`;
      }

      // 渲染分集按钮
      const epsHtml = renderEpisodes();

      $('#detailCard').innerHTML = `
        <div class="card-body">
          <h5 class="mb-2">${escapeHTML(d.summary.name)} <small class="text-muted">${escapeHTML(d.summary.remarks||'')}</small></h5>
          <div class="mb-2">
            <label class="small text-muted me-2">播放源:</label>
            <select id="sourceSelect" class="form-select form-select-sm d-inline-block w-auto" onchange="switchPlaySource()">
              ${sourceOptions}
            </select>
            <small class="text-muted ms-2">共 <span id="epCount">${currentDetail.episodes.length}</span> 集</small>
          </div>
          <div class="mb-2">
            <button class="btn btn-sm btn-light" onclick="selectAll(true)">全选</button>
            <button class="btn btn-sm btn-light" onclick="selectAll(false)">全不选</button>
            <button class="btn btn-success btn-sm float-end" onclick="downloadSelected()">⬇️ 下载所选</button>
          </div>
          <div id="epsBox">${epsHtml}</div>
        </div>
      `;

    } catch (e) {
      $('#detailCard').innerHTML = `<div class="card-body text-danger">加载失败: ${e.message}</div>`;
    }
  }

  function renderEpisodes() {
    // 渲染分集按钮
    let epsHtml = '';
    for (let i = 0; i < currentDetail.episodes.length; i++) {
      const e = currentDetail.episodes[i];
      epsHtml += `<button type="button" class="btn btn-sm btn-outline-secondary ep-btn"
        onclick="toggleEp(${i})">${escapeHTML(e.name)}</button>`;
    }
    return epsHtml;
  }

  function switchPlaySource() {
    // 切换播放源
    const flag = $('#sourceSelect').value;
    const source = currentDetail.allPlaySources.find(s => s.flag === flag);
    if (source) {
      currentDetail.flag = flag;
      currentDetail.episodes = source.episodes;
      currentDetail.selected.clear();
      // 重新渲染分集
      const epsBox = $('#epsBox');
      if (epsBox) {
        epsBox.innerHTML = renderEpisodes();
      }
      // 更新集数显示
      const epCount = $('#epCount');
      if (epCount) {
        epCount.textContent = currentDetail.episodes.length;
      }
    }
  }

  function toggleEp(i) {
    const set = currentDetail.selected;
    if (set.has(i)) set.delete(i); else set.add(i);
    const btn = document.querySelector(`#epsBox button`).parentElement.children[i];
    if (btn) btn.classList.toggle('selected');
  }

  function selectAll(on) {
    currentDetail.selected.clear();
    const btns = document.querySelectorAll('#epsBox button');
    for (let i = 0; i < btns.length; i++) {
      btns[i].classList.toggle('selected', !!on);
      if (on) currentDetail.selected.add(i);
    }
  }

  async function downloadSelected() {
    if (!currentDetail || !currentDetail.selected.size) {
      alert('请至少选一集');
      return;
    }
    const eps = [...currentDetail.selected].sort((a,b)=>a-b)
      .map(i => currentDetail.episodes[i]);
    await api('/api/download', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        video_name: currentDetail.videoName,
        episodes: eps.map(e => ({name: e.name, url: e.url})),
      }),
    });
    await refreshJobs();
  }

  async function openFolder(path) {
    try {
      const result = await api('/api/open-folder?path=' + encodeURIComponent(path), { method: 'POST' });
      if (!result.success) {
        // 计算目录路径
        const lastSep = Math.max(path.lastIndexOf('/'), path.lastIndexOf('\\'));
        const dir = lastSep > 0 ? path.substring(0, lastSep) : path;
        // 尝试复制到剪贴板
        try {
          await navigator.clipboard.writeText(dir);
          alert('目录路径已复制到剪贴板:\n' + dir + '\n\n请手动粘贴到文件资源管理器地址栏');
        } catch (clipErr) {
          alert('目录路径:\n' + dir + '\n\n自动打开失败，请手动打开上述目录');
        }
      }
    } catch (e) {
      const lastSep = Math.max(path.lastIndexOf('/'), path.lastIndexOf('\\'));
      const dir = lastSep > 0 ? path.substring(0, lastSep) : path;
      try {
        await navigator.clipboard.writeText(dir);
        alert('目录路径已复制到剪贴板:\n' + dir + '\n\n请手动粘贴到文件资源管理器地址栏');
      } catch (clipErr) {
        alert('目录路径:\n' + dir + '\n\n自动打开失败，请手动打开上述目录');
      }
    }
  }

  // 保存勾选的任务ID
  let selectedJobIds = new Set();

  function saveCheckedState() {
    document.querySelectorAll('.job-checkbox:checked').forEach(cb => {
      selectedJobIds.add(parseInt(cb.dataset.id));
    });
  }

  function restoreCheckedState() {
    document.querySelectorAll('.job-checkbox').forEach(cb => {
      cb.checked = selectedJobIds.has(parseInt(cb.dataset.id));
    });
    updateDeleteButtons();
  }

  async function refreshJobs() {
    // 刷新前保存勾选状态
    saveCheckedState();

    const data = await api('/api/jobs');
    // 统计队列状态
    const stats = {
      downloading: data.jobs.filter(j => j.status === 'downloading').length,
      queued: data.jobs.filter(j => j.status === 'queued').length,
      completed: data.jobs.filter(j => j.status === 'completed').length,
      failed: data.jobs.filter(j => j.status === 'failed').length,
    };
    // 更新状态栏
    const statusEl = document.getElementById('downloadStatus');
    if (statusEl) {
      statusEl.innerHTML = `📥 下载中: <strong>${stats.downloading}/1</strong> | ⏳ 排队中: ${stats.queued} | ✅ 完成: ${stats.completed} | ❌ 失败: ${stats.failed}`;
    }
    const html = data.jobs.map(j => {
      const cls = ({
        queued:'bg-secondary', downloading:'bg-primary',
        completed:'bg-success', failed:'bg-danger', canceled:'bg-warning text-dark'
      })[j.status] || 'bg-secondary';

      // 进度显示
      let progressHtml = '';
      if (j.status === 'downloading') {
        const speedMB = (j.download_speed / 1024 / 1024).toFixed(1);
        const speedDisplay = speedMB >= 1 ? `${speedMB} MB/s` : `${(j.download_speed / 1024).toFixed(0)} KB/s`;

        const elapsed = Math.round(j.elapsed_seconds || 0);
        const min = Math.floor(elapsed / 60);
        const sec = elapsed % 60;
        const timeStr = min > 0 ? `${min}m${sec}s` : `${sec}s`;

        // 估算剩余时间
        let etaStr = '';
        if (j.progress > 0 && j.progress < 100) {
          const totalSeconds = elapsed * 100 / j.progress;
          const remainingSeconds = Math.round(totalSeconds - elapsed);
          const etaMin = Math.floor(remainingSeconds / 60);
          const etaSec = remainingSeconds % 60;
          etaStr = etaMin > 0 ? `ETA: ${etaMin}m${etaSec}s` : `ETA: ${etaSec}s`;
        }

        // 进度条样式
        const progressBar = `
          <div class="progress" style="height: 6px; margin-top: 4px;">
            <div class="progress-bar progress-bar-striped progress-bar-animated"
                 style="width: ${j.progress}%" role="progressbar">
            </div>
          </div>
        `;

        progressHtml = `
          <div>
            <span class="text-primary fw-bold">${j.progress}%</span>
            <span class="text-muted small ms-2">${speedDisplay}</span>
            <span class="text-muted small ms-2">${timeStr}</span>
            ${etaStr ? `<span class="text-warning small ms-2">${etaStr}</span>` : ''}
            ${progressBar}
          </div>
        `;
      } else if (j.status === 'completed') {
        const elapsed = Math.round(j.elapsed_seconds || 0);
        const min = Math.floor(elapsed / 60);
        const sec = elapsed % 60;
        const timeStr = min > 0 ? `${min}m${sec}s` : `${sec}s`;
        const sizeMB = (j.bytes_downloaded / 1024 / 1024).toFixed(1);
        progressHtml = `
          <div class="text-success small">
            ✓ 完成 · ${timeStr} · ${sizeMB} MB
          </div>
        `;
      }

      // 关键：把反斜杠转义成 \\，避免 \7 等被当作八进制转义字符
      const escapedPath = j.output_path.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
      const openBtn = j.status === 'completed'
        ? `<button class="btn btn-sm btn-outline-primary" onclick="openFolder('${escapedPath}')">📂 打开</button>`
        : '';
      const downloadBtn = j.status === 'completed'
        ? `<button class="btn btn-sm btn-outline-success ms-1" onclick="downloadJob(${j.id})" title="下载到本地后自动删除服务器文件">⬇️ 下载</button>`
        : '';
      const exportedBadge = j.exported
        ? `<span class="badge bg-info ms-1">已导出</span>`
        : '';
      return `
        <tr>
          <td><input type="checkbox" class="job-checkbox" data-id="${j.id}" onchange="updateDeleteButtons()"></td>
          <td>${j.id}</td>
          <td>${escapeHTML(j.video_name)}</td>
          <td>${escapeHTML(j.episode_name)}</td>
          <td>
            <span class="badge badge-status ${cls}">${j.status}</span>
            ${progressHtml}
          </td>
          <td><code>${escapeHTML((j.error||'').slice(-120))}</code></td>
          <td><code>${escapeHTML(j.output_path)}</code></td>
          <td>
            ${openBtn}
            ${downloadBtn}
            ${exportedBadge}
            <button class="btn btn-sm btn-outline-danger ms-1" onclick="deleteJob(${j.id})">🗑️</button>
          </td>
        </tr>`;
    }).join('') || '<tr><td colspan="8" class="text-muted">还没有任务</td></tr>';

    $('#jobsBody').innerHTML = html;
    $('#jobsBodyDetail').innerHTML = html;

    // 刷新后恢复勾选状态
    restoreCheckedState();
  }

  // 绑定事件
  $('#btnSearch').onclick = search;
  $('#kw').addEventListener('keyup', e => { if (e.key === 'Enter') search(); });
  $('#btnBack').onclick = () => showView('search');
  $('#btnBackSettings').onclick = () => showView('search');

  // 初始化
  api('/api/version').then(v => {
    $('#meta').textContent =
      `v${v.version} · 下载至 ${v.download_dir} · 数据源 ${v.sources.map(s=>s.name).join('/')}`;
    // 填充数据源下拉框
    const select = $('#sourceSelect');
    v.sources.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.name;
      opt.textContent = s.name;
      select.appendChild(opt);
    });
  });
  refreshJobs();
  setInterval(refreshJobs, 2000);

  // 加载主题设置
  loadTheme();

  // 删除功能
  async function deleteJob(jobId) {
    if (!confirm('确定要删除这条下载记录吗？（不会删除已下载的文件）')) return;
    await api(`/api/jobs/${jobId}`, { method: 'DELETE' });
    await refreshJobs();
  }

  async function downloadJob(jobId) {
    // 先触发浏览器下载
    const url = `/api/jobs/${jobId}/download?delete_after=true`;
    const a = document.createElement('a');
    a.href = url;
    a.download = '';  // 让浏览器从响应头获取文件名
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    // 延迟 3 秒后删除服务器端文件并刷新状态
    setTimeout(async () => {
      try {
        await api(`/api/jobs/${jobId}/delete-file`, { method: 'POST' });
      } catch (e) {
        console.log('Delete server file failed:', e);
      }
      refreshJobs();
    }, 3000);
  }

  async function deleteSelectedJobs() {
    const checked = document.querySelectorAll('.job-checkbox:checked');
    if (checked.length === 0) return;
    if (!confirm(`确定要删除选中的 ${checked.length} 条记录吗？（不会删除已下载的文件）`)) return;
    const ids = Array.from(checked).map(cb => parseInt(cb.dataset.id));
    await api('/api/jobs/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ids })
    });
    await refreshJobs();
  }

  async function deleteAllJobs() {
    if (!confirm('确定要清空所有下载记录吗？（不会删除已下载的文件）')) return;
    await api('/api/jobs/delete', { method: 'POST' });
    await refreshJobs();
  }

  function selectAllJobs(on) {
    document.querySelectorAll('.job-checkbox').forEach(cb => cb.checked = on);
    updateDeleteButtons();
  }

  function updateDeleteButtons() {
    const checked = document.querySelectorAll('.job-checkbox:checked').length;
    const btn = $('#btnDeleteSelected');
    if (btn) btn.disabled = checked === 0;
    const btnDetail = $('#btnDeleteSelectedDetail');
    if (btnDetail) btnDetail.disabled = checked === 0;
  }

  // --- 搜索历史 --------------------------------------------------------

  async function showSearchHistory() {
    const dropdown = $('#searchHistoryDropdown');
    const data = await api('/api/search-history?limit=20');
    if (data.items.length === 0) {
      dropdown.style.display = 'none';
      return;
    }
    let html = '<h6 class="dropdown-header">🔍 搜索历史</h6>';
    for (const item of data.items) {
      html += `
        <a class="dropdown-item d-flex justify-content-between align-items-center"
           onclick="doSearch('${escapeHTML(item.keyword).replace(/'/g, "\\'")}')"
           href="javascript:void(0)">
          <span>${escapeHTML(item.keyword)}</span>
          <button class="btn btn-sm btn-outline-danger py-0 px-1"
                  onclick="event.stopPropagation();removeSearchHistory('${escapeHTML(item.keyword).replace(/'/g, "\\'")}')">×</button>
        </a>
      `;
    }
    html += '<button class="dropdown-item text-danger" onclick="clearSearchHistory()">清空全部</button>';
    dropdown.innerHTML = html;
    dropdown.style.display = 'block';
  }

  function hideSearchHistory() {
    $('#searchHistoryDropdown').style.display = 'none';
  }

  function doSearch(keyword) {
    $('#kw').value = keyword;
    search();
    hideSearchHistory();
  }

  async function removeSearchHistory(keyword) {
    await api(`/api/search-history/${encodeURIComponent(keyword)}`, { method: 'DELETE' });
    showSearchHistory();
  }

  async function clearSearchHistory() {
    if (!confirm('确定要清空搜索历史吗？')) return;
    await api('/api/search-history', { method: 'DELETE' });
    hideSearchHistory();
  }

  // --- 收藏功能 --------------------------------------------------------

  let favoritesView = false;

  async function showFavorites() {
    favoritesView = true;
    showView('search');
    const oldTitle = $('#resultsTitle');
    if (oldTitle) oldTitle.remove();
    $('#searchView').insertAdjacentHTML('afterbegin', '<h5 id="resultsTitle" class="mb-3">⭐ 我的收藏</h5>');

    const data = await api('/api/favorites');
    if (data.items.length === 0) {
      $('#results').innerHTML = '<div class="text-muted text-center py-5">还没有收藏</div>';
      return;
    }
    renderResults(data.items);
  }

  async function toggleFavorite(item) {
    const isFav = await isFavorite(item.source_name, item.vod_id);
    if (isFav) {
      await removeFavorite(item.source_name, item.vod_id);
    } else {
      await addFavorite(item);
    }
  }

  async function isFavorite(sourceName, vodId) {
    const data = await api(`/api/favorites/${encodeURIComponent(sourceName)}/${vodId}`);
    return data.is_favorite;
  }

  async function addFavorite(item) {
    await api('/api/favorites', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        source_name: item.source_name,
        vod_id: item.vod_id,
        name: item.name,
        pic: item.pic || '',
        remarks: item.remarks || '',
        year: item.year || '',
        area: item.area || '',
        type_name: item.type_name || '',
      }),
    });
  }

  async function removeFavorite(sourceName, vodId) {
    await api(`/api/favorites/${sourceName}/${vodId}`, { method: 'DELETE' });
  }

  // --- 暗黑模式 --------------------------------------------------------

  async function toggleDarkMode() {
    const isDark = document.body.classList.toggle('dark');
    await api(`/api/settings/theme?dark_mode=${isDark}`, { method: 'POST' });
  }

  async function loadTheme() {
    try {
      const data = await api('/api/settings/theme');
      if (data.dark_mode) {
        document.body.classList.add('dark');
      }
    } catch (e) {
        // 忽略错误，使用默认
      }
  }

  // 暴露全局函数
  window.handleOpenDetail = handleOpenDetail;
  window.doSearch = doSearch;
  window.removeSearchHistory = removeSearchHistory;
  window.clearSearchHistory = clearSearchHistory;
  window.showFavorites = showFavorites;
  window.toggleDarkMode = toggleDarkMode;
  window.toggleEp = toggleEp;
  window.selectAll = selectAll;
  window.downloadSelected = downloadSelected;
  window.openFolder = openFolder;
  window.deleteJob = deleteJob;
  window.deleteSelectedJobs = deleteSelectedJobs;
  window.deleteAllJobs = deleteAllJobs;
  window.selectAllJobs = selectAllJobs;
  window.updateDeleteButtons = updateDeleteButtons;

  // --- 搜索源管理 --------------------------------------------------------

  let sourceModal = null;

  function showSettings() {
    showView('settings');
    loadSources();
  }

  async function loadSources() {
    const data = await api('/api/sources');
    const tbody = $('#sourcesTableBody');
    tbody.innerHTML = data.sources.map((s, i) => `
      <tr>
        <td>${i + 1}</td>
        <td>${escapeHTML(s.name)}</td>
        <td><code class="text-muted small">${escapeHTML(s.api)}</code></td>
        <td>
          <button class="btn btn-sm btn-outline-primary me-1" onclick="editSource('${escapeHTML(s.name).replace(/'/g, "\\'")}', '${escapeHTML(s.api).replace(/'/g, "\\'")}')">编辑</button>
          <button class="btn btn-sm btn-outline-danger" onclick="deleteSource('${escapeHTML(s.name).replace(/'/g, "\\'")}')">删除</button>
        </td>
      </tr>
    `).join('');
  }

  function showAddSourceModal() {
    $('#sourceModalTitle').textContent = '新增搜索源';
    $('#sourceOldName').value = '';
    $('#sourceName').value = '';
    $('#sourceApi').value = '';
    if (!sourceModal) {
      sourceModal = new bootstrap.Modal($('#sourceModal'));
    }
    sourceModal.show();
  }

  function editSource(name, api) {
    $('#sourceModalTitle').textContent = '编辑搜索源';
    $('#sourceOldName').value = name;
    $('#sourceName').value = name;
    $('#sourceApi').value = api;
    if (!sourceModal) {
      sourceModal = new bootstrap.Modal($('#sourceModal'));
    }
    sourceModal.show();
  }

  async function saveSource() {
    const oldName = $('#sourceOldName').value;
    const newName = $('#sourceName').value.trim();
    const newApi = $('#sourceApi').value.trim();

    if (!newName || !newApi) {
      alert('名称和 API 地址不能为空');
      return;
    }

    try {
      if (oldName) {
        // 编辑模式
        await api('/api/sources', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ old_name: oldName, new_name: newName, new_api: newApi }),
        });
      } else {
        // 新增模式
        await api('/api/sources', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: newName, api: newApi }),
        });
      }
      sourceModal.hide();
      loadSources();
      // 更新页面元数据
      const v = await api('/api/version');
      $('#meta').textContent =
        `v${v.version} · 下载至 ${v.download_dir} · 数据源 ${v.sources.map(s=>s.name).join('/')}`;
      // 更新搜索下拉框
      const select = $('#sourceSelect');
      select.innerHTML = '<option value="">全部源</option>';
      v.sources.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.name;
        opt.textContent = s.name;
        select.appendChild(opt);
      });
    } catch (e) {
      alert('保存失败: ' + e.message);
    }
  }

  async function deleteSource(name) {
    if (!confirm(`确定要删除搜索源 '${name}' 吗？`)) {
      return;
    }
    try {
      await api(`/api/sources/${encodeURIComponent(name)}`, { method: 'DELETE' });
      loadSources();
      // 更新页面元数据
      const v = await api('/api/version');
      $('#meta').textContent =
        `v${v.version} · 下载至 ${v.download_dir} · 数据源 ${v.sources.map(s=>s.name).join('/')}`;
      // 更新搜索下拉框
      const select = $('#sourceSelect');
      select.innerHTML = '<option value="">全部源</option>';
      v.sources.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.name;
        opt.textContent = s.name;
        select.appendChild(opt);
      });
    } catch (e) {
      alert('删除失败: ' + e.message);
    }
  }

  window.showSettings = showSettings;
  window.showAddSourceModal = showAddSourceModal;
  window.editSource = editSource;
  window.saveSource = saveSource;
  window.deleteSource = deleteSource;
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
