<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>在线视频下载器</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <style>
    body { background: #f7f9fc; }
    .cover { width: 110px; height: 150px; object-fit: cover; border-radius: 6px; }
    .ep-btn { margin: 4px; min-width: 90px; }
    .ep-btn.selected { background: #198754; color: #fff; border-color: #198754; }
    .job-row code { font-size: 12px; }
    .badge-status { min-width: 84px; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark bg-primary mb-3">
  <div class="container">
    <span class="navbar-brand mb-0 h1">📺 在线视频下载器</span>
    <span class="text-white small" id="meta">加载中…</span>
  </div>
</nav>

<div class="container">
  <!-- 搜索栏 -->
  <div class="input-group mb-3">
    <input id="kw" type="text" class="form-control"
           placeholder="输入关键字, 例如「遮天」" />
    <button id="btnSearch" class="btn btn-primary">🔍 搜索</button>
  </div>

  <!-- 搜索结果 -->
  <div id="results" class="row g-3 mb-4"></div>

  <!-- 详情 / 分集 -->
  <div id="detail" class="card mb-4 d-none"></div>

  <!-- 任务列表 -->
  <h5>📥 下载任务</h5>
  <div id="jobs" class="table-responsive">
    <table class="table table-sm table-hover align-middle">
      <thead><tr>
        <th>#</th><th>剧名</th><th>集</th><th>状态</th><th>错误</th><th>输出</th><th>操作</th>
      </tr></thead>
      <tbody id="jobsBody"></tbody>
    </table>
  </div>
</div>

<script>
const $ = (sel) => document.querySelector(sel);

async function api(path, opts = {}) {
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function loadMeta() {
  const v = await api('/api/version');
  $('#meta').textContent =
    `v${v.version} · 下载至 ${v.download_dir} · 数据源 ${v.sources.map(s=>s.name).join('/')}`;
}

async function search() {
  const wd = $('#kw').value.trim();
  if (!wd) return;
  $('#results').innerHTML = '<div class="text-muted">搜索中…</div>';
  $('#detail').classList.add('d-none');
  const data = await api('/api/search?wd=' + encodeURIComponent(wd));
  if (!data.items.length) {
    $('#results').innerHTML =
      '<div class="alert alert-warning">没有找到结果, 换个关键字试试。</div>';
    return;
  }
  $('#results').innerHTML = data.items.map((v, i) => `
    <div class="col-md-6">
      <div class="card h-100"><div class="row g-0">
        <div class="col-auto p-2">
          <img class="cover" src="${v.pic || ''}"
               onerror="this.style.visibility='hidden'" alt="" />
        </div>
        <div class="col">
          <div class="card-body">
            <h6 class="card-title mb-1">${escapeHTML(v.name)}
              <span class="badge bg-secondary ms-1">${escapeHTML(v.remarks||'')}</span>
            </h6>
            <p class="small text-muted mb-2">
              ${escapeHTML(v.year||'')} · ${escapeHTML(v.area||'')}
              · ${escapeHTML(v.type_name||'')}
              · 源: ${escapeHTML(v.source_name)}
            </p>
            <button class="btn btn-sm btn-outline-primary"
                    onclick='openDetail(${JSON.stringify(v.source_name)},${v.vod_id},${JSON.stringify(v.name)})'>
              查看分集
            </button>
          </div>
        </div>
      </div></div>
    </div>
  `).join('');
}

let currentDetail = null; // {videoName, source_name, episodes:[{name,url}], selected:Set<number>}

async function openDetail(sourceName, vodId, fallbackName) {
  $('#detail').classList.remove('d-none');
  $('#detail').innerHTML = '<div class="card-body text-muted">加载中…</div>';
  const d = await api(`/api/detail?source_name=${encodeURIComponent(sourceName)}&vod_id=${vodId}`);
  const best = d.play_sources.find(s => s.is_recommended) || d.play_sources[0];
  if (!best) {
    $('#detail').innerHTML = '<div class="card-body text-danger">没有可用播放源</div>';
    return;
  }
  currentDetail = {
    videoName: d.summary.name || fallbackName,
    sourceName,
    flag: best.flag,
    episodes: best.episodes,
    selected: new Set(),
  };
  renderDetail(d, best);
}

function renderDetail(d, best) {
  const epsHtml = currentDetail.episodes.map((e, i) => `
    <button type="button"
            class="btn btn-sm btn-outline-secondary ep-btn"
            data-idx="${i}" onclick="toggleEp(${i})">${escapeHTML(e.name)}</button>
  `).join('');
  $('#detail').innerHTML = `
    <div class="card-body">
      <h5 class="mb-2">${escapeHTML(d.summary.name)} <small class="text-muted">${escapeHTML(d.summary.remarks||'')}</small></h5>
      <p class="small text-muted">
        播放源: ${d.play_sources.map(s =>
          `<span class="badge ${s.is_recommended?'bg-success':'bg-secondary'} me-1">${escapeHTML(s.flag)}${s.is_recommended?' ★':''}</span>`
        ).join('')}
        <br/>使用源: <code>${escapeHTML(best.flag)}</code> · 共 ${currentDetail.episodes.length} 集
      </p>
      <div class="mb-2">
        <button class="btn btn-sm btn-light" onclick="selectAll(true)">全选</button>
        <button class="btn btn-sm btn-light" onclick="selectAll(false)">全不选</button>
        <button class="btn btn-success btn-sm float-end" onclick="downloadSelected()">⬇️ 下载所选</button>
      </div>
      <div id="epsBox">${epsHtml}</div>
    </div>
  `;
}

function toggleEp(i) {
  const set = currentDetail.selected;
  if (set.has(i)) set.delete(i); else set.add(i);
  const btn = document.querySelector(`#epsBox button[data-idx="${i}"]`);
  if (btn) btn.classList.toggle('selected');
}

function selectAll(on) {
  currentDetail.selected.clear();
  document.querySelectorAll('#epsBox button').forEach((btn, i) => {
    btn.classList.toggle('selected', !!on);
    if (on) currentDetail.selected.add(i);
  });
}

async function downloadSelected() {
  if (!currentDetail || !currentDetail.selected.size) {
    alert('请至少选一集');
    return;
  }
  const eps = [...currentDetail.selected].sort((a,b)=>a-b)
    .map(i => currentDetail.episodes[i]);
  await api('/api/download', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      video_name: currentDetail.videoName,
      episodes: eps.map(e => ({name: e.name, url: e.url})),
    }),
  });
  await refreshJobs();
}

async function refreshJobs() {
  const data = await api('/api/jobs');
  $('#jobsBody').innerHTML = data.jobs.map(j => {
    const cls = ({
      queued:'bg-secondary', downloading:'bg-primary',
      completed:'bg-success', failed:'bg-danger', canceled:'bg-warning text-dark'
    })[j.status] || 'bg-secondary';
    return `
      <tr class="job-row">
        <td>${j.id}</td>
        <td>${escapeHTML(j.video_name)}</td>
        <td>${escapeHTML(j.episode_name)}</td>
        <td><span class="badge badge-status ${cls}">${j.status}</span></td>
        <td><code>${escapeHTML((j.error||'').slice(-120))}</code></td>
        <td><code>${escapeHTML(j.output_path)}</code></td>
        <td>${j.status==='queued'
          ? `<button class="btn btn-sm btn-outline-warning" onclick="cancelJob(${j.id})">取消</button>`
          : ''}</td>
      </tr>`;
  }).join('') || '<tr><td colspan="7" class="text-muted">还没有任务</td></tr>';
}

async function cancelJob(id) {
  try { await api(`/api/jobs/${id}/cancel`, {method:'POST'}); }
  catch(e) { alert(e.message); }
  await refreshJobs();
}

function escapeHTML(s) {
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])
  );
}

$('#btnSearch').onclick = search;
$('#kw').addEventListener('keyup', e => { if (e.key === 'Enter') search(); });
loadMeta();
refreshJobs();
setInterval(refreshJobs, 2000);
</script>
</body>
</html>
