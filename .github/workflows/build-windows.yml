name: Build Windows exe

on:
  push:
    tags:
      - 'v*'  # 推送 tag 时触发
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write  # 赋予上传 Release 的权限

jobs:
  build:
    runs-on: windows-latest
    name: Build Windows executable

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download ffmpeg
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath ".\ffmpeg-temp" -Force
          Get-ChildItem -Path ".\ffmpeg-temp" -Recurse -Filter "ffmpeg.exe" | Copy-Item -Destination ".\"
          Remove-Item -Recurse -Force ".\ffmpeg-temp"
          Remove-Item "ffmpeg.zip"

      - name: Build with PyInstaller
        run: |
          $env:FFMPEG_PATH = ".\ffmpeg.exe"
          pyinstaller --clean pyinstaller.spec

      - name: Check output
        run: |
          if (Test-Path ".\dist\ovd.exe") {
            $size = [math]::Round((Get-Item ".\dist\ovd.exe").Length / 1MB, 2)
            Write-Host "Build successful! Size: $size MB"
          } else {
            Write-Host "Build failed!"
            exit 1
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ovd-windows-exe
          path: ./dist/ovd.exe

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          files: ./dist/ovd.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
