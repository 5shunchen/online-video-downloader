<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>在线视频下载器</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <style>
    body { background: #f7f9fc; }
    .cover { width: 110px; height: 150px; object-fit: cover; border-radius: 6px; }
    .ep-btn { margin: 4px; min-width: 90px; }
    .ep-btn.selected { background: #198754; color: #fff; border-color: #198754; }
    .badge-status { min-width: 84px; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark bg-primary mb-3">
  <div class="container">
    <span class="navbar-brand mb-0 h1">📺 在线视频下载器</span>
    <span class="text-white small" id="meta">加载中…</span>
  </div>
</nav>

<div class="container">
  <!-- 搜索视图 -->
  <div id="searchView">
    <div class="input-group mb-3">
      <select id="sourceSelect" class="form-select" style="max-width: 150px;">
        <option value="">全部源</option>
      </select>
      <input id="kw" type="text" class="form-control"
             placeholder="输入关键字, 例如「遮天」" />
      <button id="btnSearch" class="btn btn-primary">🔍 搜索</button>
    </div>
    <div id="results" class="row g-3 mb-4"></div>
    <h5>📥 下载任务</h5>
    <div class="alert alert-info py-2 mb-2" id="downloadStatus">
      📥 下载中: <strong>0/2</strong> | ⏳ 排队中: 0 | ✅ 完成: 0 | ❌ 失败: 0
    </div>
    <div class="mb-2">
      <button class="btn btn-sm btn-outline-secondary" onclick="selectAllJobs(true)">全选</button>
      <button class="btn btn-sm btn-outline-secondary" onclick="selectAllJobs(false)">全不选</button>
      <button id="btnDeleteSelected" class="btn btn-sm btn-danger" disabled onclick="deleteSelectedJobs()">删除选中</button>
      <button class="btn btn-sm btn-outline-danger ms-2" onclick="deleteAllJobs()">清空全部</button>
    </div>
    <div class="table-responsive">
      <table class="table table-sm table-hover align-middle">
        <thead><tr>
          <th style="width: 30px;"></th><th>#</th><th>剧名</th><th>集</th><th>状态</th><th>错误</th><th>输出</th><th>操作</th>
        </tr></thead>
        <tbody id="jobsBody"></tbody>
      </table>
    </div>
  </div>

  <!-- 详情视图（默认隐藏） -->
  <div id="detailView" style="display: none;">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 id="detailTitle"></h5>
      <button id="btnBack" class="btn btn-outline-secondary">← 返回搜索</button>
    </div>
    <div id="detailCard" class="card mb-4">
      <div class="card-body text-muted">加载中…</div>
    </div>
    <h5>📥 下载任务</h5>
    <div class="alert alert-info py-2 mb-2" id="downloadStatus">
      📥 下载中: <strong>0/2</strong> | ⏳ 排队中: 0 | ✅ 完成: 0 | ❌ 失败: 0
    </div>
    <div class="mb-2">
      <button class="btn btn-sm btn-outline-secondary" onclick="selectAllJobs(true)">全选</button>
      <button class="btn btn-sm btn-outline-secondary" onclick="selectAllJobs(false)">全不选</button>
      <button id="btnDeleteSelectedDetail" class="btn btn-sm btn-danger" disabled onclick="deleteSelectedJobs()">删除选中</button>
      <button class="btn btn-sm btn-outline-danger ms-2" onclick="deleteAllJobs()">清空全部</button>
    </div>
    <div class="table-responsive">
      <table class="table table-sm table-hover align-middle">
        <thead><tr>
          <th style="width: 30px;"></th><th>#</th><th>剧名</th><th>集</th><th>状态</th><th>错误</th><th>输出</th><th>操作</th>
        </tr></thead>
        <tbody id="jobsBodyDetail"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const $ = (sel) => document.querySelector(sel);

  // 全局状态
  let currentDetail = null;

  async function api(path, opts = {}) {
    const r = await fetch(path, opts);
    if (!r.ok) {
      const err = await r.text();
      throw new Error(err || '请求失败 ' + r.status);
    }
    return r.json();
  }

  function escapeHTML(s) {
    return String(s ?? '').replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])
    );
  }

  // 切换视图
  function showView(viewName) {
    if (viewName === 'search') {
      $('#searchView').style.display = 'block';
      $('#detailView').style.display = 'none';
    } else {
      $('#searchView').style.display = 'none';
      $('#detailView').style.display = 'block';
    }
  }

  // 搜索
  async function search() {
    const kw = $('#kw').value.trim();
    if (!kw) return;
    const source = $('#sourceSelect').value;
    $('#results').innerHTML = '<div class="text-muted">搜索中…</div>';
    const url = source
      ? `/api/search?wd=${encodeURIComponent(kw)}&source=${encodeURIComponent(source)}`
      : `/api/search?wd=${encodeURIComponent(kw)}`;
    const data = await api(url);
    if (!data.items.length) {
      $('#results').innerHTML =
        '<div class="alert alert-warning">没有找到结果, 换个关键字试试。</div>';
      return;
    }
    $('#results').innerHTML = data.items.map((v, i) => `
      <div class="col-md-6 result-card" data-source="${v.source_name}" data-vod-id="${v.vod_id}">
        <div class="card h-100"><div class="row g-0">
          <div class="col-auto p-2">
            <img class="cover" src="${v.pic || ''}"
                 onerror="this.style.visibility='hidden'" alt="" />
          </div>
          <div class="col">
            <div class="card-body">
              <h6 class="card-title mb-1">${escapeHTML(v.name)}
                <span class="badge bg-secondary ms-1">${escapeHTML(v.remarks||'')}</span>
                <span class="badge bg-info ms-1">${escapeHTML(v.quality||'高清')}</span>
              </h6>
              <p class="small text-muted mb-2">
                ${escapeHTML(v.year||'')} · ${escapeHTML(v.area||'')}
                · ${escapeHTML(v.type_name||'')}
                · 源: ${escapeHTML(v.source_name)}
              </p>
              <button class="btn btn-sm btn-outline-primary detail-btn"
                      data-source="${v.source_name}" data-vod-id="${v.vod_id}" data-name="${v.name.replace(/'/g,"\\'")}">
                <span class="status-text">查看分集</span>
              </button>
            </div>
          </div>
        </div></div>
      </div>
    `).join('');

    // 绑定点击事件
    document.querySelectorAll('.detail-btn').forEach(btn => {
      btn.onclick = () => handleOpenDetail(btn.dataset.source, parseInt(btn.dataset.vodId), btn.dataset.name);
    });

    // 后台异步验证搜索结果可用性
    validateSearchResults(data.items);
  }

  // 后台异步验证搜索结果
  async function validateSearchResults(items) {
    for (const v of items) {
      try {
        const card = document.querySelector(`.result-card[data-source="${v.source_name}"][data-vod-id="${v.vod_id}"]`);
        if (!card) continue;
        const btn = card.querySelector('.detail-btn');
        if (!btn) continue;

        // 发送轻量验证请求
        const resp = await fetch(`/api/detail?source_name=${encodeURIComponent(v.source_name)}&vod_id=${v.vod_id}`);
        if (!resp.ok) {
          // 标记为失效
          card.style.opacity = '0.5';
          btn.disabled = true;
          btn.querySelector('.status-text').textContent = '链接已失效';
          btn.classList.remove('btn-outline-primary');
          btn.classList.add('btn-outline-secondary');
        }
      } catch (e) {
        // 忽略错误
      }
      // 控制并发
      await new Promise(r => setTimeout(r, 200));
    }
  }

  // 打开详情页
  async function handleOpenDetail(sourceName, vodId, videoName) {
    // 先在后台验证，成功才跳转
    try {
      const d = await api(`/api/detail?source_name=${encodeURIComponent(sourceName)}&vod_id=${vodId}`);
    } catch (e) {
      alert('该剧集播放源已失效，请换其他剧集试试');
      return;
    }

    showView('detail');
    $('#detailTitle').textContent = '📺 加载中...';
    $('#detailCard').innerHTML = '<div class="card-body text-muted">加载中…</div>';

    try {
      const d = await api(`/api/detail?source_name=${encodeURIComponent(sourceName)}&vod_id=${vodId}`);
      const best = d.play_sources.find(s => s.is_recommended) || d.play_sources[0];
      if (!best) {
        $('#detailCard').innerHTML = '<div class="card-body text-danger">没有可用播放源</div>';
        return;
      }

      currentDetail = {
        videoName: d.summary.name || videoName,
        sourceName,
        flag: best.flag,
        episodes: best.episodes,
        selected: new Set(),
      };

      $('#detailTitle').textContent = '📺 ' + currentDetail.videoName;

      // 渲染播放源标签
      let sourceBadges = '';
      for (let s of d.play_sources) {
        const cls = s.is_recommended ? 'bg-success' : 'bg-secondary';
        const star = s.is_recommended ? ' ★' : '';
        sourceBadges += `<span class="badge ${cls} me-1">${escapeHTML(s.flag)}${star}</span>`;
      }

      // 渲染分集按钮
      let epsHtml = '';
      for (let i = 0; i < currentDetail.episodes.length; i++) {
        const e = currentDetail.episodes[i];
        epsHtml += `<button type="button" class="btn btn-sm btn-outline-secondary ep-btn"
          onclick="toggleEp(${i})">${escapeHTML(e.name)}</button>`;
      }

      $('#detailCard').innerHTML = `
        <div class="card-body">
          <h5 class="mb-2">${escapeHTML(d.summary.name)} <small class="text-muted">${escapeHTML(d.summary.remarks||'')}</small></h5>
          <p class="small text-muted">
            播放源: ${sourceBadges}
            <br/>使用源: <code>${escapeHTML(best.flag)}</code> · 共 ${currentDetail.episodes.length} 集
          </p>
          <div class="mb-2">
            <button class="btn btn-sm btn-light" onclick="selectAll(true)">全选</button>
            <button class="btn btn-sm btn-light" onclick="selectAll(false)">全不选</button>
            <button class="btn btn-success btn-sm float-end" onclick="downloadSelected()">⬇️ 下载所选</button>
          </div>
          <div id="epsBox">${epsHtml}</div>
        </div>
      `;

    } catch (e) {
      $('#detailCard').innerHTML = `<div class="card-body text-danger">加载失败: ${e.message}</div>`;
    }
  }

  function toggleEp(i) {
    const set = currentDetail.selected;
    if (set.has(i)) set.delete(i); else set.add(i);
    const btn = document.querySelector(`#epsBox button`).parentElement.children[i];
    if (btn) btn.classList.toggle('selected');
  }

  function selectAll(on) {
    currentDetail.selected.clear();
    const btns = document.querySelectorAll('#epsBox button');
    for (let i = 0; i < btns.length; i++) {
      btns[i].classList.toggle('selected', !!on);
      if (on) currentDetail.selected.add(i);
    }
  }

  async function downloadSelected() {
    if (!currentDetail || !currentDetail.selected.size) {
      alert('请至少选一集');
      return;
    }
    const eps = [...currentDetail.selected].sort((a,b)=>a-b)
      .map(i => currentDetail.episodes[i]);
    await api('/api/download', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        video_name: currentDetail.videoName,
        episodes: eps.map(e => ({name: e.name, url: e.url})),
      }),
    });
    await refreshJobs();
  }

  async function openFolder(path) {
    try {
      await api('/api/open-folder?path=' + encodeURIComponent(path), { method: 'POST' });
    } catch (e) {
      alert('打开目录失败: ' + e.message);
    }
  }

  async function refreshJobs() {
    const data = await api('/api/jobs');
    // 统计队列状态
    const stats = {
      downloading: data.jobs.filter(j => j.status === 'downloading').length,
      queued: data.jobs.filter(j => j.status === 'queued').length,
      completed: data.jobs.filter(j => j.status === 'completed').length,
      failed: data.jobs.filter(j => j.status === 'failed').length,
    };
    // 更新状态栏
    const statusEl = document.getElementById('downloadStatus');
    if (statusEl) {
      statusEl.innerHTML = `📥 下载中: <strong>${stats.downloading}/1</strong> | ⏳ 排队中: ${stats.queued} | ✅ 完成: ${stats.completed} | ❌ 失败: ${stats.failed}`;
    }
    const html = data.jobs.map(j => {
      const cls = ({
        queued:'bg-secondary', downloading:'bg-primary',
        completed:'bg-success', failed:'bg-danger', canceled:'bg-warning text-dark'
      })[j.status] || 'bg-secondary';

      // 进度显示
      let progressHtml = '';
      if (j.status === 'downloading') {
        const speedMB = (j.download_speed / 1024 / 1024).toFixed(1);
        const speedDisplay = speedMB >= 1 ? `${speedMB} MB/s` : `${(j.download_speed / 1024).toFixed(0)} KB/s`;

        const elapsed = Math.round(j.elapsed_seconds || 0);
        const min = Math.floor(elapsed / 60);
        const sec = elapsed % 60;
        const timeStr = min > 0 ? `${min}m${sec}s` : `${sec}s`;

        // 估算剩余时间
        let etaStr = '';
        if (j.progress > 0 && j.progress < 100) {
          const totalSeconds = elapsed * 100 / j.progress;
          const remainingSeconds = Math.round(totalSeconds - elapsed);
          const etaMin = Math.floor(remainingSeconds / 60);
          const etaSec = remainingSeconds % 60;
          etaStr = etaMin > 0 ? `ETA: ${etaMin}m${etaSec}s` : `ETA: ${etaSec}s`;
        }

        // 进度条样式
        const progressBar = `
          <div class="progress" style="height: 6px; margin-top: 4px;">
            <div class="progress-bar progress-bar-striped progress-bar-animated"
                 style="width: ${j.progress}%" role="progressbar">
            </div>
          </div>
        `;

        progressHtml = `
          <div>
            <span class="text-primary fw-bold">${j.progress}%</span>
            <span class="text-muted small ms-2">${speedDisplay}</span>
            <span class="text-muted small ms-2">${timeStr}</span>
            ${etaStr ? `<span class="text-warning small ms-2">${etaStr}</span>` : ''}
            ${progressBar}
          </div>
        `;
      } else if (j.status === 'completed') {
        const elapsed = Math.round(j.elapsed_seconds || 0);
        const min = Math.floor(elapsed / 60);
        const sec = elapsed % 60;
        const timeStr = min > 0 ? `${min}m${sec}s` : `${sec}s`;
        const sizeMB = (j.bytes_downloaded / 1024 / 1024).toFixed(1);
        progressHtml = `
          <div class="text-success small">
            ✓ 完成 · ${timeStr} · ${sizeMB} MB
          </div>
        `;
      }

      const openBtn = j.status === 'completed'
        ? `<button class="btn btn-sm btn-outline-primary" onclick="openFolder('${j.output_path.replace(/'/g,"\\'")}')">📂 打开</button>`
        : '';
      return `
        <tr>
          <td><input type="checkbox" class="job-checkbox" data-id="${j.id}" onchange="updateDeleteButtons()"></td>
          <td>${j.id}</td>
          <td>${escapeHTML(j.video_name)}</td>
          <td>${escapeHTML(j.episode_name)}</td>
          <td>
            <span class="badge badge-status ${cls}">${j.status}</span>
            ${progressHtml}
          </td>
          <td><code>${escapeHTML((j.error||'').slice(-120))}</code></td>
          <td><code>${escapeHTML(j.output_path)}</code></td>
          <td>
            ${openBtn}
            <button class="btn btn-sm btn-outline-danger ms-1" onclick="deleteJob(${j.id})">🗑️</button>
          </td>
        </tr>`;
    }).join('') || '<tr><td colspan="8" class="text-muted">还没有任务</td></tr>';

    $('#jobsBody').innerHTML = html;
    $('#jobsBodyDetail').innerHTML = html;
  }

  // 绑定事件
  $('#btnSearch').onclick = search;
  $('#kw').addEventListener('keyup', e => { if (e.key === 'Enter') search(); });
  $('#btnBack').onclick = () => showView('search');

  // 初始化
  api('/api/version').then(v => {
    $('#meta').textContent =
      `v${v.version} · 下载至 ${v.download_dir} · 数据源 ${v.sources.map(s=>s.name).join('/')}`;
    // 填充数据源下拉框
    const select = $('#sourceSelect');
    v.sources.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.name;
      opt.textContent = s.name;
      select.appendChild(opt);
    });
  });
  refreshJobs();
  setInterval(refreshJobs, 2000);

  // 删除功能
  async function deleteJob(jobId) {
    if (!confirm('确定要删除这条下载记录吗？（不会删除已下载的文件）')) return;
    await api(`/api/jobs/${jobId}`, { method: 'DELETE' });
    await refreshJobs();
  }

  async function deleteSelectedJobs() {
    const checked = document.querySelectorAll('.job-checkbox:checked');
    if (checked.length === 0) return;
    if (!confirm(`确定要删除选中的 ${checked.length} 条记录吗？（不会删除已下载的文件）`)) return;
    const ids = Array.from(checked).map(cb => parseInt(cb.dataset.id));
    await api('/api/jobs/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ids })
    });
    await refreshJobs();
  }

  async function deleteAllJobs() {
    if (!confirm('确定要清空所有下载记录吗？（不会删除已下载的文件）')) return;
    await api('/api/jobs/delete', { method: 'POST' });
    await refreshJobs();
  }

  function selectAllJobs(on) {
    document.querySelectorAll('.job-checkbox').forEach(cb => cb.checked = on);
    updateDeleteButtons();
  }

  function updateDeleteButtons() {
    const checked = document.querySelectorAll('.job-checkbox:checked').length;
    const btn = $('#btnDeleteSelected');
    if (btn) btn.disabled = checked === 0;
    const btnDetail = $('#btnDeleteSelectedDetail');
    if (btnDetail) btnDetail.disabled = checked === 0;
  }

  // 暴露全局函数
  window.handleOpenDetail = handleOpenDetail;
  window.toggleEp = toggleEp;
  window.selectAll = selectAll;
  window.downloadSelected = downloadSelected;
  window.openFolder = openFolder;
  window.deleteJob = deleteJob;
  window.deleteSelectedJobs = deleteSelectedJobs;
  window.deleteAllJobs = deleteAllJobs;
  window.selectAllJobs = selectAllJobs;
  window.updateDeleteButtons = updateDeleteButtons;
</script>
</body>
</html>
